<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- SEO & Meta Tags -->
  <meta name="description"
    content="Kalorat — The System. Because tracking calories requires absolute clarity. Precise, honest nutrition tracking by HOPE LLC.">
  <meta name="keywords"
    content="kalorat, nutrition tracking, calorie tracker, HOPE LLC, styrian forest green, meal logger, health companion">
  <meta name="author" content="HOPE LLC">


  <!-- Open Graph -->
  <meta property="og:title" content="Kalorat | The System. Absolute Clarity.">
  <meta property="og:description"
    content="Precise, honest nutrition tracking. Engineered by HOPE LLC with fluid precision.">
  <meta property="og:image" content="icons/Icon-192.png">
  <meta name="twitter:card" content="summary_large_image">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Theme Color — Kalorat Accent: Styrian Forest -->
  <meta name="theme-color" content="#0F5838">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kalorat">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/Icon-512.png" />

  <title>Kalorat | The System. Absolute Clarity.</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preconnect to Gemini API for faster first request -->
  <link rel="preconnect" href="https://generativelanguage.googleapis.com">
  <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com">

  <style>
    /* Prevent double-highlight from browser native selection (Flutter renders its own) */
    ::selection {
      background: transparent;
    }

    ::-moz-selection {
      background: transparent;
    }

    body {
      background-color: #FFFFFF;
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* Splash Screen Styles — HOPE LLC palette */
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #0F5838;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease-out;
    }

    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .splash-logo {
      width: 120px;
      height: 120px;
      background-image: url('icons/Icon-masked-192.png');
      /* Fallback */
      background-image: url('icons/Icon-192.png');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      margin-bottom: 24px;
      animation: pulse 2s infinite ease-in-out;
    }

    .splash-text {
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div id="splash">
    <div class="splash-logo"></div>
    <div class="splash-text">Kalorat</div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistration().then((reg) => {
        if (!reg) return;
        reg.addEventListener('updatefound', () => {
          const installingWorker = reg.installing;
          if (installingWorker) {
            installingWorker.addEventListener('statechange', () => {
              if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                window.dispatchEvent(new CustomEvent('flutter-pwa-update-available'));
              }
            });
          }
        });
        if (reg.waiting) {
          window.dispatchEvent(new CustomEvent('flutter-pwa-update-available'));
        }
      });
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }

    window.skipWaitingAndReload = function () {
      navigator.serviceWorker.getRegistration().then((reg) => {
        if (reg && reg.waiting) {
          reg.waiting.postMessage('skipWaiting');
          setTimeout(() => {
            window.location.reload();
          }, 2000);
        } else {
          window.location.reload();
        }
      });
    };

    window.kaloratCameraPermissionGranted = async function () {
      try {
        return (await navigator.permissions.query({ name: 'camera' })).state === 'granted';
      } catch (_) {
        return false;
      }
    };
  </script>
  <script src="https://github.com/corbado/flutter-passkeys/releases/download/2.4.0/bundle.js"
    type="application/javascript"></script>
  <script src="flutter_bootstrap.js" async onEntrypointLoaded="onEntrypointLoaded"></script>
  <script>
    // Hook into Flutter bootstrap to remove splash
    // Note: The actual flutter_bootstrap.js might not expose onEntrypointLoaded as a global callback attribute directly depending on version,
    // but usually we can customize the loader. 
    // For standard Flutter Web, typically we inject the app runner.

    // Simplest robust method for PWA: Remove splash when the app is "ready".
    // Flutter Web apps usually remove the splash automatically if it's configured in manifest/index, 
    // but here we did a custom one.

    // Let's modify the flutter_bootstrap.js loading slightly to handle the splash removal.
    // Since we can't easily modify the pre-compiled logic, we'll use a MutationObserver 
    // to detect when Flutter injects the canvas/semantics.

    const observer = new MutationObserver((mutations) => {
      for (const mutation of mutations) {
        for (const node of mutation.addedNodes) {
          if (node.tagName === 'FLUTTER-VIEW') {
            // Flutter view added, fade out splash
            setTimeout(() => {
              const splash = document.getElementById('splash');
              if (splash) {
                splash.classList.add('fade-out');
                setTimeout(() => splash.remove(), 500);
              }
            }, 200); // Slight delay to ensure first frame render
            observer.disconnect();
          }
        }
      }
    });

    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>

</html>
